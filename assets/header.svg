<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main animated background -->
    <linearGradient id="background" x1="0" y1="0" x2="1200" y2="300">
      <stop offset="0%" stop-color="#050816">
        <animate attributeName="stop-color" values="#050816;#0F172A;#11103D;#050816" dur="14s" repeatCount="indefinite"></animate>
      </stop>

      <stop offset="50%" stop-color="#19135C">
        <animate attributeName="stop-color" values="#19135C;#312E81;#4C1D95;#19135C" dur="14s" repeatCount="indefinite"></animate>
      </stop>

      <stop offset="100%" stop-color="#581C87">
        <animate attributeName="stop-color" values="#581C87;#7C3AED;#1E3A8A;#581C87" dur="14s" repeatCount="indefinite"></animate>
      </stop>
    </linearGradient>

    <!-- Aurora gradients -->
    <radialGradient id="auroraOne">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.9"></stop>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"></stop>
    </radialGradient>

    <radialGradient id="auroraTwo">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.75"></stop>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"></stop>
    </radialGradient>

    <radialGradient id="auroraThree">
      <stop offset="0%" stop-color="#C026D3" stop-opacity="0.65"></stop>
      <stop offset="100%" stop-color="#C026D3" stop-opacity="0"></stop>
    </radialGradient>

    <!-- Wave gradients -->
    <linearGradient id="waveOne" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.15"></stop>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.45"></stop>
      <stop offset="100%" stop-color="#C026D3" stop-opacity="0.18"></stop>
    </linearGradient>

    <linearGradient id="waveTwo" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#4338CA" stop-opacity="0.18"></stop>
      <stop offset="50%" stop-color="#7C3AED" stop-opacity="0.35"></stop>
      <stop offset="100%" stop-color="#DB2777" stop-opacity="0.12"></stop>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="nameGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"></feGaussianBlur>
      <feFlood flood-color="#A78BFA" flood-opacity="0.65"></feFlood>
      <feComposite in2="blur" operator="in"></feComposite>
      <feMerge>
        <feMergeNode></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <filter id="softBlur">
      <feGaussianBlur stdDeviation="34"></feGaussianBlur>
    </filter>

    <filter id="particleGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <!-- Subtle grid -->
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#FFFFFF" stroke-opacity="0.035" stroke-width="1"></path>
    </pattern>

    <clipPath id="roundedCorners">
      <rect width="1200" height="300" rx="24"></rect>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedCorners)">
    <!-- Base -->
    <rect width="1200" height="300" fill="url(#background)"></rect>

    <!-- Grid -->
    <rect width="1200" height="300" fill="url(#grid)"></rect>

    <!-- Moving aurora lights -->
    <ellipse cx="210" cy="35" rx="290" ry="135" fill="url(#auroraOne)" filter="url(#softBlur)" opacity="0.65">
      <animate attributeName="cx" values="140;360;140" dur="13s" repeatCount="indefinite"></animate>
      <animate attributeName="cy" values="20;85;20" dur="11s" repeatCount="indefinite"></animate>
    </ellipse>

    <ellipse cx="920" cy="60" rx="330" ry="145" fill="url(#auroraTwo)" filter="url(#softBlur)" opacity="0.6">
      <animate attributeName="cx" values="1020;760;1020" dur="15s" repeatCount="indefinite"></animate>
      <animate attributeName="cy" values="35;100;35" dur="12s" repeatCount="indefinite"></animate>
    </ellipse>

    <ellipse cx="660" cy="250" rx="350" ry="100" fill="url(#auroraThree)" filter="url(#softBlur)" opacity="0.42">
      <animate attributeName="cx" values="520;760;520" dur="17s" repeatCount="indefinite"></animate>
    </ellipse>

    <!-- Floating particles -->
    <g fill="#EDE9FE" filter="url(#particleGlow)">
      <circle cx="115" cy="82" r="2.2">
        <animate attributeName="cy" values="82;60;82" dur="5s" repeatCount="indefinite"></animate>
        <animate attributeName="opacity" values="0.2;1;0.2" dur="5s" repeatCount="indefinite"></animate>
      </circle>

      <circle cx="260" cy="185" r="1.7">
        <animate attributeName="cy" values="185;155;185" dur="7s" repeatCount="indefinite"></animate>
        <animate attributeName="opacity" values="0.25;0.9;0.25" dur="7s" repeatCount="indefinite"></animate>
      </circle>

      <circle cx="410" cy="55" r="1.8">
        <animate attributeName="cy" values="55;38;55" dur="6s" repeatCount="indefinite"></animate>
        <animate attributeName="opacity" values="0.3;1;0.3" dur="6s" repeatCount="indefinite"></animate>
      </circle>

      <circle cx="790" cy="72" r="2">
        <animate attributeName="cy" values="72;46;72" dur="8s" repeatCount="indefinite"></animate>
        <animate attributeName="opacity" values="0.15;0.85;0.15" dur="8s" repeatCount="indefinite"></animate>
      </circle>

      <circle cx="1015" cy="125" r="1.8">
        <animate attributeName="cy" values="125;96;125" dur="6.5s" repeatCount="indefinite"></animate>
        <animate attributeName="opacity" values="0.2;1;0.2" dur="6.5s" repeatCount="indefinite"></animate>
      </circle>

      <circle cx="1110" cy="48" r="2.4">
        <animate attributeName="cy" values="48;28;48" dur="5.5s" repeatCount="indefinite"></animate>
        <animate attributeName="opacity" values="0.25;1;0.25" dur="5.5s" repeatCount="indefinite"></animate>
      </circle>
    </g>

    <!-- Thin orbit lines -->
    <ellipse cx="600" cy="138" rx="430" ry="105" stroke="#C4B5FD" stroke-opacity="0.08" stroke-width="1" fill="none">
      <animateTransform attributeName="transform" type="rotate" from="0 600 138" to="360 600 138" dur="40s" repeatCount="indefinite"></animateTransform>
    </ellipse>

    <ellipse cx="600" cy="138" rx="505" ry="132" stroke="#60A5FA" stroke-opacity="0.055" stroke-width="1" fill="none">
      <animateTransform attributeName="transform" type="rotate" from="360 600 138" to="0 600 138" dur="55s" repeatCount="indefinite"></animateTransform>
    </ellipse>

    <!-- Name glow backdrop -->
    <ellipse cx="600" cy="128" rx="265" ry="78" fill="#8B5CF6" opacity="0.08" filter="url(#softBlur)">
      <animate attributeName="opacity" values="0.05;0.13;0.05" dur="5s" repeatCount="indefinite"></animate>
    </ellipse>

    <!-- Name -->
    <text x="600" y="132" text-anchor="middle" fill="#FFFFFF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="58" font-weight="750" letter-spacing="1" filter="url(#nameGlow)">
      Anmar Rahman
    </text>

    <!-- Subtitle -->
    <text x="600" y="178" text-anchor="middle" fill="#DDD6FE" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="21" font-weight="500" letter-spacing="1.2">
      AI Systems Developer • Enterprise AI • Automation
    </text>

    <!-- Animated underline -->
    <rect x="475" y="200" width="250" height="2" rx="1" fill="#A78BFA" opacity="0.75">
      <animate attributeName="width" values="90;250;90" dur="4.5s" repeatCount="indefinite"></animate>
      <animate attributeName="x" values="555;475;555" dur="4.5s" repeatCount="indefinite"></animate>
      <animate attributeName="opacity" values="0.25;0.9;0.25" dur="4.5s" repeatCount="indefinite"></animate>
    </rect>

    <!-- Layered waves -->
    <path fill="url(#waveOne)">
      <animate attributeName="d" dur="11s" repeatCount="indefinite" values="
          M0 248 C180 215 350 275 555 242 C780 205 950 265 1200 225 L1200 300 L0 300 Z;
          M0 232 C210 275 390 210 590 250 C810 286 1010 210 1200 245 L1200 300 L0 300 Z;
          M0 248 C180 215 350 275 555 242 C780 205 950 265 1200 225 L1200 300 L0 300 Z
        "></animate>
    </path>

    <path fill="url(#waveTwo)">
      <animate attributeName="d" dur="8s" repeatCount="indefinite" values="
          M0 266 C230 230 430 295 630 262 C850 225 1030 275 1200 250 L1200 300 L0 300 Z;
          M0 252 C200 290 400 235 630 275 C850 305 1030 235 1200 265 L1200 300 L0 300 Z;
          M0 266 C230 230 430 295 630 262 C850 225 1030 275 1200 250 L1200 300 L0 300 Z
        "></animate>
    </path>

    <!-- Border highlight -->
    <rect x="1" y="1" width="1198" height="298" rx="23" fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="2"></rect>
  </g>
</svg>